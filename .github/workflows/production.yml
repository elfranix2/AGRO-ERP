name: GENERATION_FINALE_APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Preparer Gradle
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Construire APK
        run: ./gradlew assembleDebug

      - name: Envoyer l'APK final
        uses: actions/upload-artifact@v4  # VERSION 4 OBLIGATOIRE
        with:
          name: AGRO-ERP-V1
          path: app/build/outputs/apk/debug/app-debug.apk